//固定开头格式，仅能替换包名
syntax = "proto3";

package Example;

import "google/api/annotations.proto";
import "google/protobuf/any.proto"; // 支持任意类型数据
option go_package = "Example/api/example/v1;example";

//每个接口接受和输出消息独立使用====注释分界线
//==================================
//hello接口
//输入格式
message SignUpReq {
  string username = 1;
  string password = 2;
  string role = 3;
}
//==================================
//登录接口

// 输入格式
message SignInReq {
  string user_id = 1;
  string password = 2;
}

// 登录成功返回的数据结构
message SignInData {
  string user_id = 1;      // 用户ID
  string token = 2;        // 登录令牌
  repeated string roles = 3;         // 角色信息组
}

//==================================
//公共数据结构区域
//==================================
// 通用响应
message Response {
  int32 code = 1;           // 状态码，例如 0 表示成功，非0 表示错误
  string msg = 2;           // 提示信息
  google.protobuf.Any data = 3; // 响应数据，可封装任意 message
}
//==================================
//服务接口定义
//名称与包名一致，首字母大写
service Example {
  //每个接口独立注释，并且采用http和grpc双协议定义（除非接口文档中明确说明不用映射http）
  //get方法示例规范
  rpc SignUp(SignUpReq) returns (Response) {
    option (google.api.http) = {
      post: "/auth/signup",
      body: "*"
    };
  }
  //post方法示例规范
  // 用户登录
  rpc SignIn(SignInReq) returns (Response) {
    option (google.api.http) = {
      post: "/auth/sign_in",
      body: "*"
    };
  }

}
